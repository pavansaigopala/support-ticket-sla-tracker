spring.application.name=support-ticket-sla-tracker

# Database: H2 in-memory (override via env if needed)
spring.datasource.url=jdbc:h2:mem:support_ticket_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway (runs on startup; migrations in src/main/resources/db/migration)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# SLA breach job: every minute by default; disable with sla.breach.job.enabled=false
sla.breach.job.enabled=true
sla.breach.cron=0 * * * * ?

# Rate limit (filter for /api/v1/**): per-client IP, fixed window
rate-limit.enabled=true
rate-limit.requests-per-window=100
rate-limit.window-seconds=60
rate-limit.path-pattern=/api/v1/**

# Logging: include correlation id in each line
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId:-}] %-5level %logger{36} - %msg%n
